<!DOCTYPE html>
<meta charset="utf-8">
<style>
  body{font-family:sans-serif;margin:0}
  #pick{
    display:inline-block;font-size:32px;padding:24px 48px;margin:30px;
    background:#1a1a1a;color:#D4A017;border:2px solid #D4A017;border-radius:14px;cursor:pointer;
  }
  #pick:hover{background:#2a2a2a}
  #psd{display:none}
  #bar{margin:0 30px 10px;font-size:20px}
  #status{margin-left:12px}
</style>

<label id="pick" for="psd">📂 Выбрать PSD-шаблон</label>
<input type="file" id="psd" accept=".psd">
<div id="bar">
  <label><input type="checkbox" id="autoclose"> закрывать вкладку после сохранения</label>
  <span id="status"></span>
</div>
<div id="pea" style="width:100vw;height:80vh"></div>

<script src="https://cdn.jsdelivr.net/npm/photopea@1.0.2/dist/photopea.min.js"></script>
<script>
const LAYER_NAME = "CARDTEXT";
const FONT_URL   = "https://cdn.jsdelivr.net/gh/pablitocrypto/fonts@main/BurnedPancakes-RegularRough.otf";
const PSD_URL    = "";   // пусто = PSD выбираешь вручную; впишешь ссылку = грузится сам
const CARD_TEXT  = (new URLSearchParams(location.search).get('text') || "My Text").replace(/\n/g, "\r");
const log = m => document.getElementById('status').textContent = " " + m;

// галочка: восстановить и запоминать выбор
const cb = document.getElementById('autoclose');
cb.checked = localStorage.getItem('autoclose') === '1';
cb.addEventListener('change', () => localStorage.setItem('autoclose', cb.checked ? '1' : '0'));

async function run(psdBuf){
  log("открываю Photopea...");
  const pea = await Photopea.createEmbed(document.getElementById('pea'));
  log("открываю PSD...");      await pea.loadAsset(psdBuf);
  log("гружу шрифт...");       await pea.loadAsset(await (await fetch(FONT_URL)).arrayBuffer());
  log("вставляю текст...");
  const script = `
    function find(ls, n){
      for (var i=0;i<ls.length;i++){
        if (ls[i].name === n) return ls[i];
        if (ls[i].layers){ var r = find(ls[i].layers, n); if (r) return r; }
      }
      return null;
    }
    var L = find(app.activeDocument.layers, ${JSON.stringify(LAYER_NAME)});
    var f = L.textItem.font;
    L.textItem.contents = ${JSON.stringify(CARD_TEXT)};
    L.textItem.font = f;
    app.activeDocument.saveToOE("png");
  `;
  const out = await pea.runScript(script);
  const png = out.find(x => x instanceof ArrayBuffer);
  if (png){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([png], {type:"image/png"}));
    a.download = "card.png"; a.click();
    log("готово ✓ card.png");
    if (cb.checked) setTimeout(() => window.close(), 2000);   // закрыть, если галочка стоит
  } else {
    log("ошибка: картинка не получена");
  }
}
if (PSD_URL){
  fetch(PSD_URL).then(r => r.arrayBuffer()).then(run);
} else {
  document.getElementById('psd').addEventListener('change', async e => {
    if (e.target.files[0]) run(await e.target.files[0].arrayBuffer());
  });
}
</script>
